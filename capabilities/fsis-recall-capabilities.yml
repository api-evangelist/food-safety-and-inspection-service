name: FSIS Recall Capabilities
description: Functional capabilities exposed by the USDA FSIS Recall API.
capabilities:
  - id: list-recalls
    name: List Recalls and Public Health Alerts
    description: Retrieve the full set of FSIS recall and public health alert records.
    operation: listRecalls
    domain: Food Safety
  - id: filter-by-classification
    name: Filter Recalls by Classification (client-side)
    description: Filter the returned dataset by Class I, II, III, or Public Health Alert.
    operation: listRecalls
    domain: Food Safety
  - id: filter-by-state
    name: Filter Recalls by Affected State (client-side)
    description: Filter the returned dataset by the affected U.S. states field.
    operation: listRecalls
    domain: Food Safety
  - id: filter-by-active
    name: Filter Recalls by Active Status (client-side)
    description: Filter the returned dataset by active vs. closed recall notices.
    operation: listRecalls
    domain: Food Safety
