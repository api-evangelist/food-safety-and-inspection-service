    name: FSIS Recall API
    tags:
      - Recalls
      - Food Safety
      - Public Health Alerts
    humanURL: https://www.fsis.usda.gov/science-data/developer-resources/recall-api
    baseURL: https://www.fsis.usda.gov/fsis/api
    description: >-
      The FSIS Recall API returns a JSON list of recall and public health
      alert records for meat, poultry, and egg products. The endpoint is
      open and unauthenticated; the full dataset is returned on each request.
