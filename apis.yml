aid: food-safety-and-inspection-service
name: Food Safety and Inspection Service
description: >-
  The Food Safety and Inspection Service (FSIS) is a branch of the United
  States Department of Agriculture (USDA) responsible for ensuring the safety
  of the nation's commercial supply of meat, poultry, and egg products. FSIS
  publishes a Recall API that provides machine-readable access to recall and
  public health alert records.
